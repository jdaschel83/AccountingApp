name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker Compose
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/categories > /dev/null 2>&1; then
              echo "Backend is up"
              break
            fi
            echo "Attempt $i/30 — not ready yet"
            sleep 3
          done
          curl -sf http://localhost:3001/api/categories || (echo "Backend never became healthy" && exit 1)

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is up"
              break
            fi
            echo "Attempt $i/20 — not ready yet"
            sleep 3
          done
          curl -sf http://localhost:3000 || (echo "Frontend never became healthy" && exit 1)

      - name: Run migrations
        run: docker exec accounting-backend-1 npm run migrate

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npm test
        env:
          CI: "true"

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: e2e/test-results/
          retention-days: 7
